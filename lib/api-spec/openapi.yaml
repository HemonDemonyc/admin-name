openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: pages
  - name: gallery-interactions
  - name: storage
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "409":
          description: Conflict

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Unauthorized

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      responses:
        "200":
          description: OK

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMeResponse"

  /my/landing:
    get:
      operationId: getMyLanding
      tags: [pages]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LandingPage"
    put:
      operationId: updateMyLanding
      tags: [pages]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLandingBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LandingPage"

  /my/gallery:
    get:
      operationId: getMyGallery
      tags: [pages]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Gallery"
    put:
      operationId: updateMyGallery
      tags: [pages]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGalleryBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Gallery"

  /pages/{username}:
    get:
      operationId: getPublicLanding
      tags: [pages]
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LandingPage"
        "404":
          description: Not found

  /pages/{username}/gallery:
    get:
      operationId: getPublicGallery
      tags: [pages]
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Gallery"
        "404":
          description: Not found

  /pages/{username}/gallery/{itemId}/like:
    post:
      operationId: likeGalleryItem
      tags: [gallery-interactions]
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LikeResponse"

  /pages/{username}/gallery/{itemId}/comments:
    post:
      operationId: addGalleryComment
      tags: [gallery-interactions]
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddCommentBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Gallery"

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestUploadUrlBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestUploadUrlResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    RegisterBody:
      type: object
      properties:
        email: {type: string}
        password: {type: string}
        name: {type: string}
        username: {type: string}
      required: [email, password, name, username]

    LoginBody:
      type: object
      properties:
        email: {type: string}
        password: {type: string}
      required: [email, password]

    AuthUser:
      type: object
      properties:
        id: {type: integer}
        email: {type: string}
        name: {type: string}
        username: {type: string}
      required: [id, email, name, username]

    AuthMeResponse:
      type: object
      properties:
        user:
          oneOf:
            - $ref: "#/components/schemas/AuthUser"
            - type: "null"
      required: [user]

    SocialLink:
      type: object
      properties:
        platform: {type: string}
        url: {type: string}
        label: {type: string}
      required: [platform, url, label]

    LandingPhoto:
      type: object
      properties:
        objectPath: {type: string}
        caption: {type: ["string", "null"]}
      required: [objectPath]

    LandingSection:
      type: object
      properties:
        id: {type: string}
        title: {type: string}
        body: {type: string}
        icon: {type: ["string", "null"]}
      required: [id, title, body]

    LandingPage:
      type: object
      properties:
        id: {type: integer}
        userId: {type: integer}
        username: {type: string}
        template: {type: string}
        title: {type: string}
        subtitle: {type: ["string", "null"]}
        description: {type: ["string", "null"]}
        appFileObjectPath: {type: ["string", "null"]}
        tutorialVideoObjectPath: {type: ["string", "null"]}
        tutorialVideoUrl: {type: ["string", "null"]}
        buttonText: {type: ["string", "null"]}
        logoObjectPath: {type: ["string", "null"]}
        heroGradientFrom: {type: ["string", "null"]}
        heroGradientTo: {type: ["string", "null"]}
        heroBgType: {type: ["string", "null"]}
        heroBgColor: {type: ["string", "null"]}
        heroBgImageObjectPath: {type: ["string", "null"]}
        heroTextDark: {type: ["boolean", "null"]}
        ctaBgColor: {type: ["string", "null"]}
        ctaTextColor: {type: ["string", "null"]}
        pageBgColor: {type: ["string", "null"]}
        pageTextColor: {type: ["string", "null"]}
        accentColor: {type: ["string", "null"]}
        photos:
          type: array
          items:
            $ref: "#/components/schemas/LandingPhoto"
        socialLinks:
          type: array
          items:
            $ref: "#/components/schemas/SocialLink"
        sections:
          type: array
          items:
            $ref: "#/components/schemas/LandingSection"
      required: [id, userId, username, template, title, photos, socialLinks, sections]

    UpdateLandingBody:
      type: object
      properties:
        template: {type: string}
        title: {type: string}
        subtitle: {type: ["string", "null"]}
        description: {type: ["string", "null"]}
        appFileObjectPath: {type: ["string", "null"]}
        tutorialVideoObjectPath: {type: ["string", "null"]}
        tutorialVideoUrl: {type: ["string", "null"]}
        buttonText: {type: ["string", "null"]}
        logoObjectPath: {type: ["string", "null"]}
        heroGradientFrom: {type: ["string", "null"]}
        heroGradientTo: {type: ["string", "null"]}
        heroBgType: {type: ["string", "null"]}
        heroBgColor: {type: ["string", "null"]}
        heroBgImageObjectPath: {type: ["string", "null"]}
        heroTextDark: {type: ["boolean", "null"]}
        ctaBgColor: {type: ["string", "null"]}
        ctaTextColor: {type: ["string", "null"]}
        pageBgColor: {type: ["string", "null"]}
        pageTextColor: {type: ["string", "null"]}
        accentColor: {type: ["string", "null"]}
        photos:
          type: array
          items:
            $ref: "#/components/schemas/LandingPhoto"
        socialLinks:
          type: array
          items:
            $ref: "#/components/schemas/SocialLink"
        sections:
          type: array
          items:
            $ref: "#/components/schemas/LandingSection"

    GalleryComment:
      type: object
      properties:
        id: {type: string}
        author: {type: string}
        text: {type: string}
        timestamp: {type: string}
      required: [id, author, text, timestamp]

    GalleryItem:
      type: object
      properties:
        id: {type: string}
        objectPath: {type: string}
        type:
          type: string
          enum: [photo, video]
        title: {type: ["string", "null"]}
        caption: {type: ["string", "null"]}
        order: {type: integer}
        likes: {type: integer}
        comments:
          type: array
          items:
            $ref: "#/components/schemas/GalleryComment"
      required: [id, objectPath, type, order, likes, comments]

    Gallery:
      type: object
      properties:
        id: {type: integer}
        userId: {type: integer}
        title: {type: ["string", "null"]}
        description: {type: ["string", "null"]}
        items:
          type: array
          items:
            $ref: "#/components/schemas/GalleryItem"
      required: [id, userId, items]

    UpdateGalleryBody:
      type: object
      properties:
        title: {type: ["string", "null"]}
        description: {type: ["string", "null"]}
        items:
          type: array
          items:
            $ref: "#/components/schemas/GalleryItem"

    LikeResponse:
      type: object
      properties:
        likes: {type: integer}
      required: [likes]

    AddCommentBody:
      type: object
      properties:
        author: {type: string}
        text: {type: string}
      required: [author, text]

    RequestUploadUrlBody:
      type: object
      properties:
        name: {type: string}
        size: {type: integer}
        contentType: {type: string}
      required: [name, size, contentType]

    RequestUploadUrlResponse:
      type: object
      properties:
        uploadURL: {type: string}
        objectPath: {type: string}
      required: [uploadURL, objectPath]
